<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberwolf — Particle Sphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      overflow: hidden;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      display: block;
    }

    #controls {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 9px;
      padding: 18px 26px;
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.09);
      border-radius: 18px;
      user-select: none;
      z-index: 10;
    }

    .ctrl-divider {
      height: 1px;
      background: rgba(0, 0, 0, 0.08);
      margin: 2px 0;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .ctrl-label {
      width: 68px;
      font-size: 10px;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.38);
      flex-shrink: 0;
    }

    .ctrl-val {
      width: 42px;
      text-align: right;
      font-size: 11px;
      font-weight: 600;
      color: rgba(0, 0, 0, 0.8);
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 160px;
      height: 1px;
      background: rgba(0, 0, 0, 0.18);
      border-radius: 1px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: #000;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.12s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.4); }

    #exportBtn {
      margin-top: 4px;
      padding: 7px 0;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }
    #exportBtn:disabled { opacity: 0.45; cursor: default; }
    #exportBtn:not(:disabled):hover { opacity: 0.7; }

    /* ── Mobile: sphere top half, controls bottom half ── */
    @media (max-width: 600px) {
      #controls {
        position: fixed;
        top: 50vh;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        transform: none;
        border-radius: 0;
        border: none;
        border-top: 1px solid rgba(0, 0, 0, 0.10);
        background: #fff;
        padding: 14px 20px env(safe-area-inset-bottom, 16px);
        gap: 10px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .ctrl-row { gap: 12px; }
      .ctrl-label { width: 60px; font-size: 9px; }
      .ctrl-val   { width: 36px; font-size: 10px; }
      input[type="range"] { flex: 1; width: auto; min-width: 0; }
      #exportBtn { margin-top: 6px; padding: 10px 0; font-size: 11px; }
    }
  </style>
</head>
<body>

  <div id="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">Amount</span>
      <input type="range" id="countSlider"    min="10"  max="3000" step="1"   value="3000">
      <span class="ctrl-val" id="countVal">3000</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Order</span>
      <input type="range" id="orderSlider"    min="0"   max="100"  step="1"   value="100">
      <span class="ctrl-val" id="orderVal">100%</span>
    </div>
    <div class="ctrl-divider"></div>
    <div class="ctrl-row">
      <span class="ctrl-label">Shape</span>
      <input type="range" id="sizeSlider"     min="10"  max="800"  step="1"   value="246">
      <span class="ctrl-val" id="sizeVal">246%</span>
    </div>
    <div class="ctrl-divider"></div>
    <div class="ctrl-row">
      <span class="ctrl-label">Inner R</span>
      <input type="range" id="innerSlider"    min="0.1" max="4.0"  step="0.1" value="1.0">
      <span class="ctrl-val" id="innerVal">1.0</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Outer R</span>
      <input type="range" id="outerSlider"    min="0.1" max="5.0"  step="0.1" value="1.9">
      <span class="ctrl-val" id="outerVal">1.9</span>
    </div>
    <div class="ctrl-divider"></div>
    <div class="ctrl-row">
      <span class="ctrl-label">Speed</span>
      <input type="range" id="speedSlider"    min="0"   max="500"  step="1"   value="132">
      <span class="ctrl-val" id="speedVal">132%</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Stagger</span>
      <input type="range" id="staggerSlider"  min="0"   max="100"  step="1"   value="100">
      <span class="ctrl-val" id="staggerVal">100%</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Overlap</span>
      <input type="range" id="overlapSlider"  min="0"   max="100"  step="1"   value="68">
      <span class="ctrl-val" id="overlapVal">68%</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Shuffle</span>
      <input type="range" id="shuffleSlider"  min="0"   max="100"  step="1"   value="27">
      <span class="ctrl-val" id="shuffleVal">27%</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Rotation</span>
      <input type="range" id="rotationSlider" min="0"   max="100"  step="1"   value="100">
      <span class="ctrl-val" id="rotationVal">100%</span>
    </div>
    <div class="ctrl-divider"></div>
    <button id="exportBtn">Export</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- Pre-load mp4-muxer so it's available when export starts -->
  <script type="module">
    import * as mp4Muxer from 'https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.3/+esm';
    window.mp4Muxer = mp4Muxer;
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    /* ── Viewport helpers ── */
    const mobile = () => window.innerWidth <= 600;
    function canvasSize() {
      return { w: window.innerWidth, h: mobile() ? Math.round(window.innerHeight * 0.5) : window.innerHeight };
    }

    /* ── Renderer ── */
    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    const { w: iW, h: iH } = canvasSize();
    renderer.setSize(iW, iH);
    renderer.setClearColor(0xffffff, 1);
    document.body.prepend(renderer.domElement);

    /* ── Scene / Camera ── */
    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(52, iW / iH, 0.01, 200);
    camera.position.set(0, 0, 8);

    /* ── Orbit controls ── */
    const orbit = new OrbitControls(camera, renderer.domElement);
    orbit.enableDamping   = true;
    orbit.dampingFactor   = 0.05;
    orbit.autoRotate      = true;
    orbit.autoRotateSpeed = 3.0;
    orbit.minDistance     = 2;
    orbit.maxDistance     = 20;

    /* ── Shape geometry (Sources/shape.svg) ── */
    const SVG_W = 69, SVG_H = 59;
    const BASE_SCALE = 0.0003;
    const rawPts = [
      [26.9443, 58.7875], [41.369,  58.7875],
      [68.3132, 12.5196], [60.9648,  0],
      [ 7.34843, 0],      [ 0,      12.5196],
    ];
    const shape = new THREE.Shape();
    rawPts.forEach(([x, y], i) => {
      const tx =  (x - SVG_W / 2) * BASE_SCALE;
      const ty = -(y - SVG_H / 2) * BASE_SCALE;
      i === 0 ? shape.moveTo(tx, ty) : shape.lineTo(tx, ty);
    });
    shape.closePath();

    const particleGeo = new THREE.ShapeGeometry(shape);
    const mat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });

    /* ── Particle data ── */
    const MAX_COUNT = 3000;
    const WAVE_AMP  = 0.30;
    const WAVE_FREQ = 2.5;
    const WAVE_SPD  = 0.45;

    const gridDirs = Array.from({ length: MAX_COUNT }, () => new THREE.Vector3());
    function computeGridDirs(n) {
      if (n < 1) return;
      const nLon = Math.max(2, Math.round(Math.sqrt(2 * n)));
      const nLat = Math.max(1, Math.ceil(n / nLon));
      for (let i = 0; i < n; i++) {
        const row = Math.floor(i / nLon);
        const col = i % nLon;
        const lat = Math.PI * ((row + 0.5) / nLat - 0.5);
        const lon = 2 * Math.PI * col / nLon;
        gridDirs[i].set(Math.cos(lat) * Math.cos(lon), Math.sin(lat), Math.cos(lat) * Math.sin(lon)).normalize();
      }
    }

    const randDirs = Array.from({ length: MAX_COUNT }, () => {
      const lat = Math.PI * (Math.random() - 0.5);
      const lon = 2 * Math.PI * Math.random();
      return new THREE.Vector3(Math.cos(lat) * Math.cos(lon), Math.sin(lat), Math.cos(lat) * Math.sin(lon)).normalize();
    });

    const phaseOrder = new Int32Array(MAX_COUNT);
    for (let i = 0; i < MAX_COUNT; i++) phaseOrder[i] = i;
    for (let i = MAX_COUNT - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = phaseOrder[i]; phaseOrder[i] = phaseOrder[j]; phaseOrder[j] = tmp;
    }

    const instancedMesh = new THREE.InstancedMesh(particleGeo, mat, MAX_COUNT);
    instancedMesh.frustumCulled = false;
    scene.add(instancedMesh);

    /* ── Live values ── */
    let currentCount = 3000;
    let sizePct      = 246;
    let orderPct     = 100;
    let speed        = 1.32;
    let staggerPct   = 100;
    let overlapPct   = 68;
    let shufflePct   = 27;
    let innerR       = 1.0;
    let outerR       = 1.9;

    computeGridDirs(currentCount);
    instancedMesh.count = currentCount;

    function bind(id, valId, fmt, onChange) {
      const el = document.getElementById(id);
      document.getElementById(valId).textContent = fmt(parseFloat(el.value));
      el.addEventListener('input', () => {
        const v = parseFloat(el.value);
        document.getElementById(valId).textContent = fmt(v);
        onChange(v);
      });
    }
    bind('countSlider',    'countVal',    v => Math.round(v),        v => { currentCount = Math.round(v); computeGridDirs(currentCount); instancedMesh.count = currentCount; });
    bind('orderSlider',    'orderVal',    v => Math.round(v) + '%',  v => { orderPct   = v; });
    bind('sizeSlider',     'sizeVal',     v => Math.round(v) + '%',  v => { sizePct    = v; });
    bind('innerSlider',    'innerVal',    v => v.toFixed(1),          v => { innerR     = v; });
    bind('outerSlider',    'outerVal',    v => v.toFixed(1),          v => { outerR     = v; });
    bind('speedSlider',    'speedVal',    v => Math.round(v) + '%',  v => { speed      = v / 100; });
    bind('staggerSlider',  'staggerVal',  v => Math.round(v) + '%',  v => { staggerPct = v; });
    bind('overlapSlider',  'overlapVal',  v => Math.round(v) + '%',  v => { overlapPct = v; });
    bind('shuffleSlider',  'shuffleVal',  v => Math.round(v) + '%',  v => { shufflePct = v; });
    bind('rotationSlider', 'rotationVal', v => Math.round(v) + '%',  v => { orbit.autoRotateSpeed = (v / 100) * 3.0; });

    /* ── Pre-allocated temporaries ── */
    const _vBase  = new THREE.Vector3();
    const _vEast  = new THREE.Vector3();
    const _vNorth = new THREE.Vector3();
    const _vA = new THREE.Vector3();
    const _vB = new THREE.Vector3();
    const _vC = new THREE.Vector3();
    const _vD = new THREE.Vector3();
    const _vE = new THREE.Vector3();
    const _m4 = new THREE.Matrix4();
    const camDir = new THREE.Vector3();
    const dummy  = new THREE.Object3D();

    /* ── Core render function — shared by live loop and export ── */
    function renderAt(t) {
      camDir.copy(camera.position).normalize();

      const TWO_PI    = 2 * Math.PI;
      const sizeMult  = sizePct / 100;
      const rnd       = 1.0 - orderPct / 100;
      const waveScale = rnd;
      const rInner    = Math.min(innerR, outerR - 0.05);
      const rOuter    = outerR;
      const stagger01 = staggerPct / 100;
      const overlap01 = overlapPct / 100;
      const shuffle01 = shufflePct / 100;
      const N         = currentCount;
      const cyclePhase = ((t * 0.9) % TWO_PI + TWO_PI) % TWO_PI;
      const halfWindow = Math.PI * (1 - stagger01 * (1 - 1 / N) * (1 - overlap01));

      for (let i = 0; i < currentCount; i++) {
        _vBase.lerpVectors(gridDirs[i], randDirs[i], rnd).normalize();

        _vEast.set(-_vBase.z, 0, _vBase.x);
        if (_vEast.lengthSq() < 0.001) _vEast.set(1, 0, 0);
        _vEast.normalize();
        _vNorth.crossVectors(_vEast, _vBase).normalize();

        const lon = Math.atan2(_vBase.z, _vBase.x);
        const lat = _vBase.y;
        const wE  = Math.sin(lon * WAVE_FREQ + t * WAVE_SPD) * WAVE_AMP * waveScale;
        const wN  = Math.sin(lat * WAVE_FREQ * 1.4 - t * WAVE_SPD * 0.7) * WAVE_AMP * waveScale * 0.5;
        _vA.copy(_vBase).addScaledVector(_vEast, wE).addScaledVector(_vNorth, wN).normalize();

        const rank     = i * (1 - shuffle01) + phaseOrder[i] * shuffle01;
        const outStart = (rank / N) * stagger01 * Math.PI;
        const outPhase = ((cyclePhase - outStart) % TWO_PI + TWO_PI) % TWO_PI;

        let r;
        if (outPhase < halfWindow) {
          const p = outPhase / halfWindow;
          r = rInner + (rOuter - rInner) * (0.5 - 0.5 * Math.cos(p * Math.PI));
        } else if (outPhase < Math.PI) {
          r = rOuter;
        } else if (outPhase < Math.PI + halfWindow) {
          const p = (outPhase - Math.PI) / halfWindow;
          r = rOuter - (rOuter - rInner) * (0.5 - 0.5 * Math.cos(p * Math.PI));
        } else {
          r = rInner;
        }

        _vB.copy(_vA).multiplyScalar(r);

        const facing     = Math.max(0, _vA.dot(camDir));
        const depthScale = 0.04 + 0.96 * Math.pow(facing, 1.4);
        dummy.scale.setScalar(depthScale * sizeMult);

        _vC.subVectors(camera.position, _vB).normalize();
        const d = _vA.dot(_vC);
        _vD.copy(_vA).addScaledVector(_vC, -d);
        if (_vD.lengthSq() < 1e-6) _vD.copy(camera.up).addScaledVector(_vC, -camera.up.dot(_vC));
        _vD.normalize();
        _vE.crossVectors(_vD, _vC).normalize();

        _m4.makeBasis(_vE, _vD, _vC);
        dummy.position.copy(_vB);
        dummy.quaternion.setFromRotationMatrix(_m4);
        dummy.updateMatrix();
        instancedMesh.setMatrixAt(i, dummy.matrix);
      }

      instancedMesh.instanceMatrix.needsUpdate = true;
      renderer.render(scene, camera);
    }

    /* ── Live render loop ── */
    const clock = new THREE.Clock();
    let isRecording = false;  // true = VideoEncoder active, pauses live loop
    let isCapturing = false;  // true = MediaRecorder active, live loop runs but orbit frozen

    (function animate() {
      requestAnimationFrame(animate);
      if (isRecording) return;
      if (!isCapturing) orbit.update();
      renderAt(clock.getElapsedTime() * speed);
    })();

    /* ── Resize ── */
    window.addEventListener('resize', () => {
      if (isRecording || isCapturing) return;
      const { w, h } = canvasSize();
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });

    /* ── Export (equipe-danvers pattern: async for-loop + createImageBitmap) ── */
    const EXPORT_FPS  = 60;
    const EXPORT_SIZE = 3840; // 4K square, always even

    let exporting = false;

    async function startExport() {
      if (exporting) return;

      const btn = document.getElementById('exportBtn');

      function done(msg) {
        exporting        = false;
        isRecording      = false;
        orbit.autoRotate = true;
        renderer.setSize(live.w, live.h);
        camera.aspect = live.w / live.h;
        camera.updateProjectionMatrix();
        btn.textContent = msg || 'Export';
        btn.disabled    = false;
      }

      if (typeof VideoEncoder === 'undefined') {
        alert('MP4 export requires Chrome or Edge.'); return;
      }

      exporting        = true;
      btn.textContent  = 'Preparing…';
      btn.disabled     = true;

      const live = canvasSize();
      const EW   = EXPORT_SIZE;
      const EH   = EXPORT_SIZE;

      // ≈ 10 s snapped to a whole number of oscillation cycles
      const period = (2 * Math.PI) / (0.9 * speed);
      const dur    = Math.max(1, Math.round(10 / period)) * period;
      const totalFrames = Math.round(dur * EXPORT_FPS);

      orbit.autoRotate = false;
      isRecording      = true;
      renderer.setSize(EW, EH);
      camera.aspect = 1.0;
      camera.updateProjectionMatrix();

      // Temp canvas for drawing each frame
      const tmp    = document.createElement('canvas');
      tmp.width    = EW;
      tmp.height   = EH;
      const tmpCtx = tmp.getContext('2d', { alpha: false });

      // Wait for mp4-muxer
      await new Promise(res => {
        const check = () => window.mp4Muxer ? res() : setTimeout(check, 50);
        check();
      });
      const { Muxer, ArrayBufferTarget } = window.mp4Muxer;

      const target = new ArrayBufferTarget();
      const muxer  = new Muxer({
        target,
        video: { codec: 'avc', width: EW, height: EH },
        fastStart: 'in-memory',
        firstTimestampBehavior: 'offset',
      });

      // Probe codec at actual export resolution so we only pick a level that supports it.
      // Use framerate:30 / lower bitrate to avoid rejections on those axes.
      const candidates = ['avc1.640042', 'avc1.640040', 'avc1.64003e', 'avc1.64003d'];
      let codec = null;
      for (const c of candidates) {
        try {
          const r = await VideoEncoder.isConfigSupported(
            { codec: c, width: EW, height: EH, bitrate: 20_000_000, framerate: 30 });
          if (r.supported) { codec = c; break; }
        } catch (_) {}
      }
      if (!codec) { done('No H.264 Level 6.x codec supported — try Chrome on desktop'); return; }

      let encoderError = null;
      const videoEncoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error:  e => { encoderError = e; },
      });

      try {
        videoEncoder.configure({ codec, width: EW, height: EH, bitrate: 50_000_000, framerate: EXPORT_FPS });
      } catch (e) { done('Configure failed: ' + e.message); return; }

      // Sequential async render loop — no rAF, no captureActive juggling
      for (let i = 0; i < totalFrames; i++) {
        if (encoderError) { done('Encoder error: ' + encoderError.message); return; }

        const t_frame = (i / totalFrames) * dur * speed;
        renderAt(t_frame);

        tmpCtx.fillStyle = '#fff';
        tmpCtx.fillRect(0, 0, EW, EH);
        tmpCtx.drawImage(renderer.domElement,
          0, 0, renderer.domElement.width, renderer.domElement.height,
          0, 0, EW, EH);

        // createImageBitmap — broader compat than passing canvas to VideoFrame directly
        const bitmap = await createImageBitmap(tmp);
        const frame  = new VideoFrame(bitmap, {
          timestamp: Math.round((i / EXPORT_FPS) * 1_000_000),
          duration:  Math.round(1_000_000 / EXPORT_FPS),
        });
        bitmap.close();
        videoEncoder.encode(frame, { keyFrame: i % 60 === 0 });
        frame.close();

        // Let encoder breathe
        while (videoEncoder.encodeQueueSize > 10) {
          await new Promise(r => setTimeout(r, 16));
        }

        btn.textContent = Math.round(((i + 1) / totalFrames) * 100) + '%';
      }

      if (encoderError) { done('Encoder error: ' + encoderError.message); return; }

      await videoEncoder.flush();
      videoEncoder.close();
      muxer.finalize();

      const blob = new Blob([target.buffer], { type: 'video/mp4' });
      Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(blob),
        download: 'cyberwolf-sphere.mp4',
      }).click();

      done('Export');
    }

    document.getElementById('exportBtn').addEventListener('click', startExport);

  </script>
</body>
</html>
